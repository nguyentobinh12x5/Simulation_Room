<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Smart Lab 3D Digital Twin</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #hud {
    position: fixed; top: 12px; left: 12px; color: #fff;
    background: rgba(15, 23, 42, 0.85); padding: 12px 16px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); font-size: 13px;
    line-height: 1.7; pointer-events: none; z-index: 10;
  }
  .hud-title { font-weight: bold; font-size: 14px; color: #38bdf8; margin-bottom: 4px; }
  .hud-stat { display: flex; justify-content: space-between; gap: 16px; }
  .hud-val { font-family: monospace; font-weight: 600; }
</style>
</head>
<body>
<div id="hud">
  <div class="hud-title">🏢 Smart Lab Digital Twin — 3D View</div>
  <div class="hud-stat"><span>Room Temp:</span> <span class="hud-val" id="val-temp">--°C</span></div>
  <div class="hud-stat"><span>Occupants:</span> <span class="hud-val" id="val-occ">0</span></div>
  <div class="hud-stat"><span>AC State:</span> <span class="hud-val" id="val-hvac">OFF</span></div>
  <div class="hud-stat"><span>AC Power:</span> <span class="hud-val" id="val-power">0%</span></div>
  <div class="hud-stat"><span>Setpoint:</span> <span class="hud-val" id="val-sp">--°C</span></div>
</div>

<script src="vendor/mqtt.min.js"></script>
<script type="module">
import * as THREE from './vendor/three.module.js';

// ─── 1. Scene setup ──────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);
scene.fog = new THREE.FogExp2(0x0f172a, 0.025);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 11, 14);
camera.lookAt(0, 1, 1);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── 2. Lighting ─────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
sunLight.position.set(8, 15, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 30;
sunLight.shadow.camera.left = -10;
sunLight.shadow.camera.right = 10;
sunLight.shadow.camera.top = 10;
sunLight.shadow.camera.bottom = -10;
scene.add(sunLight);

// Lab ceiling point light
const labLight = new THREE.PointLight(0xe0f2fe, 0.6, 12);
labLight.position.set(0, 3.2, 0);
scene.add(labLight);

// Corridor ceiling point light
const corridorLight = new THREE.PointLight(0xfef08a, 0.5, 10);
corridorLight.position.set(0, 3.2, 6);
scene.add(corridorLight);

// ─── 3. Environment Architecture (Room + Corridor + Door) ────
const rootGroup = new THREE.Group();
scene.add(rootGroup);

// Room Floor (10m wide x 8m deep, z from -4 to 4)
const roomFloorMat = new THREE.MeshStandardMaterial({ color: 0x2266ff, roughness: 0.3 });
const roomFloor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 8), roomFloorMat);
roomFloor.position.set(0, -0.1, 0);
roomFloor.receiveShadow = true;
rootGroup.add(roomFloor);

// Corridor Floor (10m wide x 4m deep, z from 4 to 8)
const corridorFloorMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.6 });
const corridorFloor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 4), corridorFloorMat);
corridorFloor.position.set(0, -0.1, 6);
corridorFloor.receiveShadow = true;
rootGroup.add(corridorFloor);

// Wall materials
const wallSolidMat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.5 });
const wallGlassMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.22, roughness: 0.1 });

// Back Wall (z = -4)
const backWall = new THREE.Mesh(new THREE.BoxGeometry(10, 3.2, 0.15), wallSolidMat);
backWall.position.set(0, 1.6, -4);
rootGroup.add(backWall);

// Side Walls (Left & Right for both room and corridor)
const leftRoomWall = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.2, 8), wallGlassMat);
leftRoomWall.position.set(-5, 1.6, 0);
rootGroup.add(leftRoomWall);

const rightRoomWall = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.2, 8), wallGlassMat);
rightRoomWall.position.set(5, 1.6, 0);
rootGroup.add(rightRoomWall);

const leftCorridorWall = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.2, 4), wallSolidMat);
leftCorridorWall.position.set(-5, 1.6, 6);
rootGroup.add(leftCorridorWall);

const rightCorridorWall = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.2, 4), wallSolidMat);
rightCorridorWall.position.set(5, 1.6, 6);
rootGroup.add(rightCorridorWall);

// Front Wall splitting Room and Corridor (z = 4), with doorway gap across x: [-1.4, 1.4]
const leftFrontWall = new THREE.Mesh(new THREE.BoxGeometry(3.6, 3.2, 0.15), wallSolidMat);
leftFrontWall.position.set(-3.2, 1.6, 4);
rootGroup.add(leftFrontWall);

const rightFrontWall = new THREE.Mesh(new THREE.BoxGeometry(3.6, 3.2, 0.15), wallSolidMat);
rightFrontWall.position.set(3.2, 1.6, 4);
rootGroup.add(rightFrontWall);

// Door header above the sliding doors
const doorHeader = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.8, 0.15), wallSolidMat);
doorHeader.position.set(0, 2.8, 4);
rootGroup.add(doorHeader);

// Automatic Sliding Glass Doors
const doorMat = new THREE.MeshStandardMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.4, roughness: 0.1 });
const leftDoor = new THREE.Mesh(new THREE.BoxGeometry(1.35, 2.4, 0.08), doorMat);
leftDoor.position.set(-0.68, 1.2, 4);
rootGroup.add(leftDoor);

const rightDoor = new THREE.Mesh(new THREE.BoxGeometry(1.35, 2.4, 0.08), doorMat);
rightDoor.position.set(0.68, 1.2, 4);
rootGroup.add(rightDoor);

let doorOpenAmount = 0.0; // 0.0 = closed, 1.0 = fully open

// ─── 4. Lab Furniture & AC Unit ──────────────────────────────
const tableMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.4 });
const topMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.2 });

function createLabTable(x, z) {
  const group = new THREE.Group();
  const top = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.08, 1.2), topMat);
  top.position.set(0, 0.8, 0); top.castShadow = true; top.receiveShadow = true;
  group.add(top);
  [[-1.2,-0.5],[1.2,-0.5],[-1.2,0.5],[1.2,0.5]].forEach(([dx, dz]) => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.8, 0.08), tableMat);
    leg.position.set(dx, 0.4, dz); leg.castShadow = true;
    group.add(leg);
  });
  group.position.set(x, 0, z);
  rootGroup.add(group);
}
createLabTable(-2.4, -1.5);
createLabTable(2.4, -1.5);
createLabTable(-2.4, 1.5);
createLabTable(2.4, 1.5);

// Ceiling AC Unit & Fan
const acBody = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.2, 1.8), new THREE.MeshStandardMaterial({ color: 0xf8fafc }));
acBody.position.set(0, 3.1, 0);
rootGroup.add(acBody);

const fan = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.05, 0.25), new THREE.MeshStandardMaterial({ color: 0x38bdf8 }));
fan.position.set(0, 2.95, 0);
rootGroup.add(fan);

// ─── 5. Dynamic Human Agents System ──────────────────────────
const headGeo = new THREE.SphereGeometry(0.18, 16, 16);
const bodyGeo = new THREE.CapsuleGeometry(0.18, 0.55, 8, 16);
const personColors = [0x38bdf8, 0xf43f5e, 0x10b981, 0xf59e0b, 0xa855f7, 0xec4899];

class Person {
  constructor(id, isEntering = true) {
    this.id = id;
    this.group = new THREE.Group();
    
    const color = personColors[id % personColors.length];
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4 });
    const headMat = new THREE.MeshStandardMaterial({ color: 0xfde047, roughness: 0.5 });
    
    this.body = new THREE.Mesh(bodyGeo, mat);
    this.body.position.y = 0.55;
    this.body.castShadow = true;
    this.group.add(this.body);
    
    this.head = new THREE.Mesh(headGeo, headMat);
    this.head.position.y = 1.15;
    this.head.castShadow = true;
    this.group.add(this.head);
    
    // Initial spawn
    if (isEntering) {
      // Spawn in corridor outside
      this.group.position.set((Math.random() - 0.5) * 6, 0, 7.5);
      this.state = 'entering_corridor';
      this.target = { x: (Math.random() - 0.5) * 1.6, z: 4.2 }; // walk to doorway
    } else {
      // Spawn directly inside room
      const spot = this.getRandomRoomSpot();
      this.group.position.set(spot.x, 0, spot.z);
      this.state = 'in_room';
      this.target = spot;
      this.waitTimer = Math.random() * 3 + 1;
    }
    this.speed = 1.8 + Math.random() * 0.6; // m/s
    this.baseY = 0;
    rootGroup.add(this.group);
  }

  getRandomRoomSpot() {
    // Pick spots around tables or aisles
    const spots = [
      { x: (Math.random() - 0.5) * 7, z: (Math.random() - 0.5) * 5 },
      { x: -2.4 + (Math.random() - 0.5) * 1.5, z: -0.2 },
      { x: 2.4 + (Math.random() - 0.5) * 1.5, z: -0.2 },
      { x: 0 + (Math.random() - 0.5) * 1.5, z: 1.5 },
    ];
    return spots[Math.floor(Math.random() * spots.length)];
  }

  startExiting() {
    if (this.state === 'exiting_room' || this.state === 'exiting_corridor') return;
    this.state = 'exiting_room';
    this.target = { x: (Math.random() - 0.5) * 1.4, z: 3.8 }; // walk to inside doorway
  }

  update(dt, elapsedTime) {
    const pos = this.group.position;
    const dx = this.target.x - pos.x;
    const dz = this.target.z - pos.z;
    const dist = Math.hypot(dx, dz);

    if (dist > 0.08) {
      // Walk towards target
      const move = Math.min(dist, this.speed * dt);
      pos.x += (dx / dist) * move;
      pos.z += (dz / dist) * move;
      
      // Face direction of movement
      const angle = Math.atan2(dx, dz);
      this.group.rotation.y = angle;
      
      // Natural walking bob motion
      pos.y = Math.abs(Math.sin(elapsedTime * 10 + this.id)) * 0.08;
    } else {
      pos.y = 0; // standing still
      
      // State transitions on reaching waypoint
      if (this.state === 'entering_corridor') {
        this.state = 'entering_room';
        this.target = this.getRandomRoomSpot();
      } else if (this.state === 'entering_room') {
        this.state = 'in_room';
        this.waitTimer = Math.random() * 4 + 2;
      } else if (this.state === 'in_room') {
        this.waitTimer -= dt;
        if (this.waitTimer <= 0) {
          this.target = this.getRandomRoomSpot();
          this.waitTimer = Math.random() * 5 + 3;
        }
      } else if (this.state === 'exiting_room') {
        this.state = 'exiting_corridor';
        this.target = { x: (Math.random() - 0.5) * 6, z: 7.8 }; // walk deep into corridor
      } else if (this.state === 'exiting_corridor') {
        this.state = 'removed';
      }
    }
  }

  destroy() {
    rootGroup.remove(this.group);
  }
}

let people = [];
let targetOccupancy = 0;
let personIdCounter = 1;

function syncPeopleCount(targetCount) {
  targetOccupancy = targetCount;
  
  // Count how many people are currently staying or entering
  const activePeople = people.filter(p => p.state !== 'exiting_room' && p.state !== 'exiting_corridor' && p.state !== 'removed');
  
  if (activePeople.length < targetOccupancy) {
    const toAdd = targetOccupancy - activePeople.length;
    for (let i = 0; i < toAdd; i++) {
      people.push(new Person(personIdCounter++, true));
    }
  } else if (activePeople.length > targetOccupancy) {
    const toRemove = activePeople.length - targetOccupancy;
    // Tell people inside the room to walk out to the corridor
    let removedCount = 0;
    for (let i = activePeople.length - 1; i >= 0 && removedCount < toRemove; i--) {
      if (activePeople[i].state === 'in_room' || activePeople[i].state === 'entering_room') {
        activePeople[i].startExiting();
        removedCount++;
      }
    }
  }
}

// ─── 6. MQTT & Telemetry Handling ────────────────────────────
let temp = 24.0, hvacOn = false, acPowerPct = 0.0, setpoint = 25.0;

const client = mqtt.connect('ws://localhost:9001');
client.on('connect', () => {
  client.subscribe([
    'twin/room1/temperature',
    'twin/room1/occupancy',
    'twin/room1/hvac/state',
    'twin/room1/ac/detail'
  ]);
});

client.on('message', (topic, payload) => {
  try {
    const d = JSON.parse(payload.toString());
    if (topic.endsWith('/temperature')) {
      temp = d.value;
      document.getElementById('val-temp').innerText = `${temp.toFixed(1)}°C`;
      document.getElementById('val-temp').style.color = temp >= 30 ? '#ef4444' : '#fff';
    } else if (topic.endsWith('/occupancy')) {
      syncPeopleCount(d.value);
      document.getElementById('val-occ').innerText = `${d.value}`;
    } else if (topic.endsWith('/hvac/state')) {
      hvacOn = d.hvac_on;
      acPowerPct = d.ac_power_pct || 0;
      document.getElementById('val-hvac').innerText = hvacOn ? '🟢 ON' : '⚪ OFF';
      document.getElementById('val-power').innerText = `${Math.round(acPowerPct * 100)}%`;
    } else if (topic.endsWith('/ac/detail')) {
      acPowerPct = d.ac_power_pct || 0;
      setpoint = d.setpoint || 25;
      document.getElementById('val-power').innerText = `${Math.round(acPowerPct * 100)}%`;
      document.getElementById('val-sp').innerText = `${setpoint.toFixed(1)}°C`;
    }
  } catch (e) { console.error(e); }
});

// ─── 7. Main Animation Loop ──────────────────────────────────
const clock = new THREE.Clock();
const coldColor = new THREE.Color(0x2266ff);
const hotColor = new THREE.Color(0xff3322);

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsedTime = clock.getElapsedTime();

  // Floor color dynamic lerp: blue (comfort/setpoint reached) to red (hotter than setpoint)
  let k = 0.0;
  if (temp > setpoint) {
    k = Math.min((temp - setpoint) / 4.0, 1.0); // fully red if 4°C above setpoint
  }
  roomFloorMat.color.copy(coldColor).lerp(hotColor, k);

  // AC Fan spinning speed proportional to power
  if (hvacOn && acPowerPct > 0) {
    fan.rotation.y += dt * (2 + acPowerPct * 12);
  }

  // Update people movement
  let someoneNearDoor = false;
  for (let i = people.length - 1; i >= 0; i--) {
    const p = people[i];
    p.update(dt, elapsedTime);
    
    // Check distance to doorway (x:0, z:4) for door sensor
    const distToDoor = Math.hypot(p.group.position.x, p.group.position.z - 4);
    if (distToDoor < 2.4) someoneNearDoor = true;

    if (p.state === 'removed') {
      p.destroy();
      people.splice(i, 1);
    }
  }

  // Automatic door sliding logic
  const targetDoorOpen = someoneNearDoor ? 1.0 : 0.0;
  doorOpenAmount += (targetDoorOpen - doorOpenAmount) * Math.min(1.0, dt * 5);
  leftDoor.position.x = -0.68 - (0.85 * doorOpenAmount);
  rightDoor.position.x = 0.68 + (0.85 * doorOpenAmount);

  // Subtle slow camera pan to give dynamic feeling
  camera.position.x = Math.sin(elapsedTime * 0.15) * 2;
  camera.lookAt(0, 1, 1);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
